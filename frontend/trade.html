<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Trading</title>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="container">

    <h1>📄 Paper Trading</h1>
    <p class="subtitle">
      Simulate trades safely with virtual capital
    </p>

    <div class="card trade-card">

      <input
        id="tradeSymbol"
        placeholder="Stock Symbol (AAPL)"
        autocomplete="off"
      />

      <input
        id="quantity"
        type="number"
        placeholder="Quantity"
        min="1"
      />

      <!-- Price removed (backend auto-fetches live price) -->

      <div class="trade-actions">
        <button onclick="placeTrade('buy')" class="buy">
          BUY
        </button>

        <button onclick="placeTrade('sell')" class="sell">
          SELL
        </button>
      </div>

    </div>

    <div id="tradeResult" class="trade-result"></div>

  </div>

  <script>
    const API_BASE = "https://ai-stock-platform-zpkg.onrender.com";

    async function placeTrade(action) {

      const symbol = document
        .getElementById("tradeSymbol")
        .value
        .trim()
        .toUpperCase();

      const quantity = parseInt(
        document.getElementById("quantity").value
      );

      const resultBox = document.getElementById("tradeResult");

      if (!symbol || !quantity || quantity <= 0) {
        resultBox.innerHTML = "⚠ Please enter valid symbol and quantity";
        return;
      }

      resultBox.innerHTML = "Processing trade...";

      try {
        const response = await fetch(`${API_BASE}/trade`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            symbol: symbol,
            action: action,
            quantity: quantity
          })
        });

        const data = await response.json();

        if (data.status === "error") {
          resultBox.innerHTML = `
            ❌ ${data.message}
          `;
          return;
        }

        const portfolio = data.portfolio;

        resultBox.innerHTML = `
          ✅ <b>${data.trade.action.toUpperCase()}</b> executed at 
          $${data.trade.price} <br><br>

          💰 <b>Balance:</b> $${portfolio.balance} <br>
          📊 <b>Total Value:</b> $${portfolio.total_value} <br><br>

          📌 <b>Holdings:</b> <br>
          ${portfolio.holdings.length === 0 
            ? "No holdings"
            : portfolio.holdings.map(h =>
                `${h.symbol} — ${h.quantity} shares ($${h.value})`
              ).join("<br>")
          }
        `;

      } catch (err) {
        resultBox.innerHTML = "❌ Server error. Try again.";
      }
    }
  </script>

</body>
</html>
